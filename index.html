
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LuxeEstate Global | Signature Estates</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --accent: #B6AE9F;
        --accent-hover: #A59B89;
        --text-main: #1A1A1A;
        --text-muted: #6B7280;
        --bg: #FFFFFF;
        --easing: cubic-bezier(0.4, 0, 0.2, 1);
        
        /* Fluid Responsive Typography */
        --font-h1: clamp(2.5rem, 10vw, 6rem);
        --font-h2: clamp(2rem, 8vw, 4rem);
        --font-h3: clamp(1.5rem, 6vw, 2.8rem);
        --font-h4: clamp(1.2rem, 4vw, 2rem);
        --font-p: clamp(1rem, 1.2vw, 1.25rem);
      }
      
      html, body {
        overflow-x: hidden;
        width: 100%;
        scroll-behavior: smooth;
      }

      body {
        font-family: 'Inter', sans-serif;
        color: var(--text-main);
        background-color: var(--bg);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      h1, h2, h3, h4 {
        font-family: 'Montserrat', sans-serif;
        text-transform: uppercase;
        letter-spacing: -0.04em;
        margin-bottom: 0.5em;
        color: var(--text-main);
      }

      h1 { font-size: var(--font-h1); font-weight: 900; line-height: 0.9; }
      h2 { font-size: var(--font-h2); font-weight: 900; line-height: 1.0; }
      h3 { font-size: var(--font-h3); font-weight: 800; line-height: 1.1; }
      h4 { font-size: var(--font-h4); font-weight: 800; line-height: 1.2; }
      p { font-size: var(--font-p); color: var(--text-muted); }

      /* CRITICAL: Scrim for text legibility on images - Enhanced 4-point gradient */
      .scrim-bottom {
        background: linear-gradient(to top, 
          rgba(0, 0, 0, 0.9) 0%, 
          rgba(0, 0, 0, 0.6) 35%, 
          rgba(0, 0, 0, 0.2) 65%, 
          transparent 100%);
        pointer-events: none;
      }

      /* CRITICAL: Premium 3D Ambient Depth & Lift */
      .ambient-depth {
        box-shadow: 0 20px 50px -15px rgba(0, 0, 0, 0.08);
        transition: all 0.8s var(--easing);
      }
      
      .hover-lift {
        transition: all 0.6s var(--easing);
      }
      
      @media (min-width: 1024px) {
        .hover-lift:hover {
          transform: translateY(-12px);
          box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.12);
        }
      }

      .btn-premium {
        position: relative;
        overflow: hidden;
        transition: all 0.4s var(--easing);
        letter-spacing: 0.3em;
        font-weight: 900;
        text-transform: uppercase;
        font-size: 0.75rem;
      }

      .glass-nav {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }

      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

      @keyframes revealUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-reveal {
        animation: revealUp 1.2s var(--easing) forwards;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="antialiased">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
